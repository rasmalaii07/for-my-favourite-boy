<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise for You</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --pink: #ffafcc; --red: #ff4d6d; --cream: #fff5f5; }
        body { background: linear-gradient(135deg, #fff5f5 0%, #ffafcc 100%); font-family: 'Quicksand', sans-serif; margin: 0; text-align: center; overflow: hidden; height: 100vh; }
        
        /* 1. CUSTOM SVG FALLING ANIMATIONS */
        .falling-item { position: fixed; top: -50px; z-index: 1; pointer-events: none; animation: fall linear infinite; width: 30px; height: 30px; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* TIMER AT BASE */
        #start-counter-wrap { position: fixed; bottom: 20px; width: 100%; z-index: 5; }
        #start-counter { background: rgba(255,255,255,0.9); padding: 10px 25px; border-radius: 30px; display: inline-block; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid var(--pink); color: #555; }

        /* GAME STYLES */
        #game-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2; position: relative; }
        .heart-sticker { position: absolute; width: 60px; height: 60px; cursor: pointer; transition: transform 0.3s; z-index: 10; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1)); }
        
        /* AESTHETIC WHITE BOX */
        #gift-section { display: none; padding: 20px; height: 100vh; z-index: 10; position: relative; }
        #hamper-container { position: relative; width: 320px; height: 320px; margin: 50px auto; cursor: pointer; }
        
        #box-lid { 
            position: absolute; width: 100%; height: 100%; z-index: 20;
            background-color: white;
            background-image: radial-gradient(var(--red) 12%, transparent 13%); /* Tiny heart pattern substitute */
            background-size: 30px 30px;
            border-radius: 15px; border: 4px solid var(--red);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s;
            display: flex; align-items: center; justify-content: center;
        }

        .ribbon-v { position: absolute; width: 40px; height: 100%; background: var(--red); left: 50%; transform: translateX(-50%); }
        .ribbon-h { position: absolute; width: 100%; height: 40px; background: var(--red); top: 50%; transform: translateY(-50%); }
        .lid-tag { z-index:30; background:white; padding:8px 20px; border-radius:10px; font-family:'Dancing Script'; font-weight:bold; color:var(--red); border: 2px solid var(--red); box-shadow: 0 5px 10px rgba(0,0,0,0.1); }

        #flat-lay-box { 
            background: white; width: 100%; height: 100%; border-radius: 15px; position: absolute; 
            top: 0; left: 0; padding: 20px; border: 8px solid #fff; overflow: hidden; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; align-items: center;
        }

        .box-item { width: 90px; height: 90px; object-fit: contain; cursor: pointer; transition: 0.3s; margin: auto; }
        .box-item:hover { transform: scale(1.15) rotate(3deg); }

        /* ITEM REVEAL OVERLAY */
        #item-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,245,245,0.98); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        .overlay-content { background: white; padding: 40px; border-radius: 30px; max-width: 450px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border: 3px solid var(--pink); position: relative; }
    </style>
</head>
<body>

    <div id="fall-container"></div>

    <!-- START PAGE -->
    <div id="game-container">
        <h2 style="font-family: 'Dancing Script'; color: var(--red); font-size: 35px;">Catch 5 Hearts for a Surprise...</h2>
        <div id="play-area" style="height: 50vh; width: 85vw; position: relative;"></div>
        <div id="start-counter-wrap">
            <div id="start-counter">
                <span style="font-weight:bold; color: var(--red); font-family: 'Dancing Script'; font-size: 22px;">Time we've spent together:</span> <br>
                <span id="timer-display" style="font-size: 18px; letter-spacing: 1px;">Calculating...</span>
            </div>
        </div>
    </div>

    <!-- BOX SECTION -->
    <div id="gift-section">
        <h1 style="font-family: 'Dancing Script'; color: var(--red); font-size: 40px;">Slide the lid to open! ✨</h1>
        <div id="hamper-container" onclick="openLid()">
            <div id="box-lid">
                <div class="ribbon-v"></div>
                <div class="ribbon-h"></div>
                <div class="lid-tag">Open Me ❤️</div>
            </div>
            <div id="flat-lay-box">
                <img src="https://png.pngtree.com" class="box-item" onclick="showItem('letter')">
                <img src="https://static.vecteezy.com" class="box-item" onclick="showItem('ticket')">
                <img src="https://static.vecteezy.com" class="box-item" onclick="showItem('pizza')">
                <img src="https://static.vecteezy.com" class="box-item" onclick="showItem('charm')">
            </div>
        </div>
        <button style="margin-top:20px; padding:12px 30px; border-radius:25px; border:none; background:var(--pink); color:white; font-weight:bold; cursor:pointer;" onclick="location.reload()">Back to Start</button>
    </div>

    <!-- ITEM REVEAL OVERLAY -->
    <div id="item-overlay" onclick="closeItem()">
        <div class="overlay-content" onclick="event.stopPropagation()">
            <span style="position:absolute; top:20px; right:25px; font-size:30px; cursor:pointer; color:var(--red);" onclick="closeItem()">×</span>
            <div id="overlay-text"></div>
        </div>
    </div>

    <script>
        const startDate = new Date("December 1, 2024 23:32:00").getTime();
        let score = 0;

        // 1. CUSTOM AESTHETIC FALLING ITEMS (NO EMOJIS)
        const heartSVG = `<svg viewBox="0 0 32 32" fill="#ffafcc"><path d="M16 28.5s-12-7.1-12-14.8c0-4.5 3.3-7.7 7.5-7.7 2.5 0 4.1 1.2 4.5 2.5.4-1.3 2-2.5 4.5-2.5 4.2 0 7.5 3.2 7.5 7.7 0 7.7-12 14.8-12 14.8z"/></svg>`;
        const bowSVG = `<svg viewBox="0 0 512 512" fill="#ff4d6d"><path d="M448 256c0-44.2-35.8-80-80-80-16.1 0-31 4.8-43.5 13.1L256 224l-68.5-34.9c-12.5-8.3-27.4-13.1-43.5-13.1-44.2 0-80 35.8-80 80s35.8 80 80 80c16.1 0 31-4.8 43.5-13.1L256 288l68.5 34.9c12.5 8.3 27.4 13.1 43.5 13.1 44.2 0 80-35.8 80-80z"/></svg>`;

        function createFalling() {
            const el = document.createElement('div');
            el.className = 'falling-item';
            el.innerHTML = Math.random() > 0.5 ? heartSVG : bowSVG;
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = (Math.random() * 3 + 4) + 's';
            el.style.opacity = Math.random() * 0.5 + 0.3;
            document.getElementById('fall-container').appendChild(el);
            setTimeout(() => el.remove(), 7000);
        }
        setInterval(createFalling, 500);

        // TIMER LOGIC
        function updateTimer() {
            const now = new Date().getTime();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("timer-display").innerHTML = `<b>${days}</b>d <b>${hours}</b>h <b>${mins}</b>m <b>${secs}</b>s`;
        }
        setInterval(updateTimer, 1000);

        // GAME LOGIC (SVG Hearts)
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart-sticker';
            heart.innerHTML = heartSVG;
            heart.style.left = Math.random() * 80 + '%';
            heart.style.top = Math.random() * 80 + '%';
            heart.onclick = () => {
                score++;
                heart.remove();
                if (score < 5) createHeart();
                else {
                    document.getElementById('game-container').style.display = 'none';
                    document.getElementById('gift-section').style.display = 'block';
                }
            };
            document.getElementById('play-area').appendChild(heart);
        }

        // OPEN BOX
        function openLid() {
            new Audio('https://www.soundjay.com').play();
            const lid = document.getElementById('box-lid');
            lid.style.transform = 'translateY(-450px) rotate(-10deg)';
            lid.style.opacity = '0';
            setTimeout(() => { lid.style.display = 'none'; }, 1200);
        }

        const contents = {
            letter: "<h2>Hey, pretty boy.</h2><p style='text-align:left; line-height:1.7;'>This is the first time I've tried something like this... You are the best thing that ever happened to me and I'm so glad to have found you. Being with you for a little over a year, I've realised that love isn't always supposed to be perfect. It can get messy, but I wouldn't want to deal with this mess with anyone else. <br><br> I know how much you love me and I am more than willing to be patient with you despite all my crashouts :p</p>",
            ticket: "<h2>Unlimited Hugs</h2><p>Valid forever. No expiration date. ❤️</p>",
            pizza: "<h2>Virtual Pizza</h2><p>The cheesiest pizza for the cheesiest guy. 🍕</p>",
            charm: "<h2>Protection Charm</h2><p>I've always got your back. Always. ✨</p>"
        };

        function showItem(key) {
            document.getElementById('overlay-text').innerHTML = contents[key];
            document.getElementById('item-overlay').style.display = 'flex';
        }
        function closeItem() { document.getElementById('item-overlay').style.display = 'none'; }

        createHeart();
    </script>
</body>
</html>
