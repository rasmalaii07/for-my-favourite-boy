<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Favorite Person</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --pink: #ffafcc; --red: #ff4d6d; --hot-pink: #ff006e; }
        body { background: #fff5f5; font-family: 'Quicksand', sans-serif; margin: 0; text-align: center; overflow: hidden; height: 100vh; }
        
        .falling-item { position: fixed; top: -50px; z-index: 1; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        #start-counter-wrap { position: fixed; bottom: 20px; width: 100%; z-index: 5; }
        #start-counter { background: white; padding: 12px 25px; border-radius: 30px; display: inline-block; box-shadow: 0 4px 15px rgba(255, 77, 109, 0.2); border: 2px solid var(--pink); color: #444; }

        #game-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2; position: relative; }
        .heart-btn { position: absolute; width: 50px; height: 50px; cursor: pointer; transition: transform 0.2s; z-index: 10; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.1)); }
        #score-board { font-family: 'Dancing Script'; font-size: 28px; color: var(--red); margin-bottom: 10px; }

        #gift-section { display: none; padding: 20px; height: 100vh; z-index: 10; position: relative; }
        #hamper-container { position: relative; width: 340px; height: 400px; margin: 20px auto; cursor: pointer; }
        
        #box-lid { 
            position: absolute; width: 100%; height: 100%; z-index: 20;
            background-color: #fff; border-radius: 12px; border: 4px solid var(--red);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1); transition: transform 1s ease-in-out, opacity 0.8s;
            display: flex; align-items: center; justify-content: center;
        }

        .ribbon-v { position: absolute; width: 45px; height: 100%; background: var(--red); left: 50%; transform: translateX(-50%); }
        .ribbon-h { position: absolute; width: 100%; height: 45px; background: var(--red); top: 50%; transform: translateY(-50%); }
        .lid-text { z-index:30; background:white; padding:5px 15px; border-radius:8px; font-family:'Dancing Script'; color:var(--red); font-size:24px; border: 2px solid var(--red); }

        #hamper-interior { 
            background: #fff; width: 100%; height: 100%; border-radius: 12px; position: absolute; 
            top: 0; left: 0; padding: 15px; border: 4px solid #f0f0f0; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; box-sizing: border-box; overflow-y: auto;
        }

        .svg-icon { width: 70px; height: 70px; cursor: pointer; transition: 0.3s; margin: auto; }
        .svg-icon:hover { transform: scale(1.1) rotate(5deg); }

        #item-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 100; justify-content: center; align-items: center; }
        .overlay-content { background: white; padding: 40px; border-radius: 30px; max-width: 450px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); border: 2px solid var(--pink); position: relative; overflow-y: auto; max-height: 80vh; }
    </style>
</head>
<body>

    <div id="fall-container"></div>

    <div id="game-container">
        <div id="score-board">Catch 20 Hearts for Your Surprise! ❤️ <br> <span id="score">0</span> / 20</div>
        <div id="play-area" style="height: 50vh; width: 85vw; position: relative;"></div>
        <div id="start-counter-wrap">
            <div id="start-counter">
                <span style="font-family: 'Dancing Script'; font-size: 24px; color: var(--red);">We started:</span> <br>
                <span id="timer-display" style="font-size: 18px; font-weight: bold;">Calculating...</span>
            </div>
        </div>
    </div>

    <div id="gift-section">
        <h1 style="font-family: 'Dancing Script'; color: var(--red); font-size: 32px;">Your Gift Hamper ✨</h1>
        <div id="hamper-container" onclick="openLid()">
            <div id="box-lid">
                <div class="ribbon-v"></div>
                <div class="ribbon-h"></div>
                <div class="lid-text">Click to Open</div>
            </div>
            <div id="hamper-interior">
                <!-- 8 Interactive Items -->
                <div class="svg-icon" onclick="showItem('letter')"><svg viewBox="0 0 100 100"><rect x="10" y="20" width="80" height="60" rx="5" fill="#ffafcc"/><path d="M10 20 L50 50 L90 20" stroke="white" stroke-width="4" fill="none"/></svg></div>
                <div class="svg-icon" onclick="showItem('hug')"><svg viewBox="0 0 100 100"><rect x="5" y="30" width="90" height="40" rx="5" fill="#ff4d6d"/><text x="15" y="55" fill="white" font-size="10" font-weight="bold">HUG TICKET</text></svg></div>
                <div class="svg-icon" onclick="showItem('kiss')"><svg viewBox="0 0 100 100"><rect x="5" y="30" width="90" height="40" rx="5" fill="#ff85a1"/><text x="15" y="55" fill="white" font-size="10" font-weight="bold">KISS TICKET</text></svg></div>
                <div class="svg-icon" onclick="showItem('note1')"><svg viewBox="0 0 100 100"><rect x="20" y="10" width="60" height="80" fill="#fff9c4" stroke="#fbc02d" stroke-width="2"/><line x1="30" y1="30" x2="70" y2="30" stroke="#fbc02d"/><line x1="30" y1="50" x2="70" y2="50" stroke="#fbc02d"/></svg></div>
                <div class="svg-icon" onclick="showItem('pizza')"><svg viewBox="0 0 100 100"><path d="M50 10 L90 80 L10 80 Z" fill="#FFD93D"/><circle cx="50" cy="50" r="5" fill="#FF6B6B"/><circle cx="40" cy="65" r="5" fill="#FF6B6B"/></svg></div>
                <div class="svg-icon" onclick="showItem('always')"><svg viewBox="0 0 100 100"><path d="M50 10 L85 30 L85 70 L50 90 L15 70 L15 30 Z" fill="#ffafcc" stroke="#ff4d6d" stroke-width="4"/><text x="25" y="55" fill="#ff4d6d" font-size="10" font-weight="bold">ALWAYS</text></svg></div>
                <div class="svg-icon" onclick="showItem('note2')"><svg viewBox="0 0 100 100"><rect x="20" y="10" width="60" height="80" fill="#e1f5fe" stroke="#03a9f4" stroke-width="2"/><line x1="30" y1="30" x2="70" y2="30" stroke="#03a9f4"/></svg></div>
                <div class="svg-icon" onclick="showItem('smile')"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#FFD93D"/><circle cx="35" cy="40" r="5" fill="000"/><circle cx="65" cy="40" r="5" fill="000"/><path d="M30 60 Q50 80 70 60" stroke="000" fill="none" stroke-width="3"/></svg></div>
            </div>
        </div>
        <button style="margin-top:10px; padding:8px 25px; border-radius:20px; border:none; background:var(--pink); color:white; font-weight:bold; cursor:pointer;" onclick="location.reload()">Back to Start</button>
    </div>

    <div id="item-overlay" onclick="closeItem()">
        <div class="overlay-content" onclick="event.stopPropagation()">
            <span style="position:absolute; top:15px; right:20px; font-size:30px; cursor:pointer; color:var(--red);" onclick="closeItem()">×</span>
            <div id="overlay-text"></div>
        </div>
    </div>

    <script>
        const startDate = new Date("December 1, 2024 23:32:00").getTime();
        let score = 0;
        const heartSVG = `<svg viewBox="0 0 32 32" style="width:100%; height:100%;"><path d="M16 28.5s-12-7.1-12-14.8c0-4.5 3.3-7.7 7.5-7.7 2.5 0 4.1 1.2 4.5 2.5.4-1.3 2-2.5 4.5-2.5 4.2 0 7.5 3.2 7.5 7.7 0 7.7-12 14.8-12 14.8z" fill="#ff4d6d"/></svg>`;

        function createFalling() {
            const el = document.createElement('div');
            el.className = 'falling-item';
            el.innerHTML = heartSVG;
            el.style.width = (Math.random() * 20 + 20) + 'px';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = (Math.random() * 3 + 5) + 's';
            el.style.opacity = '0.4';
            document.getElementById('fall-container').appendChild(el);
            setTimeout(() => el.remove(), 8000);
        }
        setInterval(createFalling, 600);

        function updateTimer() {
            const now = new Date().getTime();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("timer-display").innerHTML = `${days}d ${hours}h ${mins}m ${secs}s`;
        }
        setInterval(updateTimer, 1000);

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart-btn';
            heart.innerHTML = heartSVG;
            heart.style.left = Math.random() * 85 + '%';
            heart.style.top = Math.random() * 85 + '%';
            heart.onclick = () => {
                score++;
                document.getElementById('score').innerText = score;
                heart.remove();
                if (score < 20) createHeart();
                else {
                    document.getElementById('game-container').style.display = 'none';
                    document.getElementById('gift-section').style.display = 'block';
                }
            };
            document.getElementById('play-area').appendChild(heart);
        }

        function openLid() {
            const lid = document.getElementById('box-lid');
            lid.style.transform = 'translateY(-550px) rotate(-10deg)';
            lid.style.opacity = '0';
        }

        const contents = {
            letter: "<h2>Hey, pretty boy.</h2><p style='text-align:left; line-height:1.6;'>This is the first time I've tried something like this... You are the best thing that ever happened to me. Being with you for a little over a year, I've realised that love isn't always supposed to be perfect. It can get messy, but I wouldn't want to deal with this mess with anyone else. I'm more than willing to be patient with you despite all my crashouts :p</p>",
            hug: "<h2>Unlimited Hugs</h2><p>Good for one lifetime of warm, cozy hugs whenever you need them. ❤️</p>",
            kiss: "<h2>Unlimited Kisses</h2><p>A ticket for endless kisses. Can be used anytime, anywhere! 💋</p>",
            note1: "<h2>Love Note #1</h2><p>I love the way you make me feel safe. You're my home. ✨</p>",
            pizza: "<h2>Virtual Pizza</h2><p>Extra cheese for the cheesiest boy. 🍕</p>",
            always: "<h2>Always Love</h2><p>A promise that I'm always on your side, no matter what. 🛡️</p>",
            note2: "<h2>Love Note #2</h2><p>Thank you for being you. You're my favorite person in the whole world. 🌎</p>",
            smile: "<h2>Smile Generator</h2><p>I hope this website made you smile as much as you make me smile. 😊</p>"
        };

        function showItem(key) {
            document.getElementById('overlay-text').innerHTML = contents[key];
            document.getElementById('item-overlay').style.display = 'flex';
        }
        function closeItem() { document.getElementById('item-overlay').style.display = 'none'; }

        createHeart();
    </script>
</body>
</html>
